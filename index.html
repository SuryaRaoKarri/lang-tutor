<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya's French Auto-Loop Tutor V2</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --french-color: #60a5fa;
            --english-color: #34d399;
            --playing-bg: #334155;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 { text-align: center; font-size: 1.5rem; color: var(--text-muted); margin-bottom: 15px;}

        textarea {
            width: 100%;
            height: 100px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
            resize: vertical;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Styling for dropdowns and number inputs */
        input[type="number"], select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Make dropdowns full width of their grid cell */
        select {
            width: 100%;
        }

        /* Specific sizing for the number input box */
        input[type="number"] {
            width: 55px;
            text-align: center;
            padding: 6px 4px;
        }

        /* Styling for the slider */
        input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s;
        }

        button:hover { background-color: var(--border-color); }
        
        button.primary { background-color: var(--primary); border-color: var(--primary); }
        button.primary:hover { background-color: var(--primary-hover); }
        
        button.danger { background-color: var(--danger); border-color: var(--danger); }
        button.danger:hover { background-color: var(--danger-hover); }

        /* List View Styles */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s;
        }

        .list-item.playing {
            background-color: var(--playing-bg);
            border-left: 4px solid var(--primary);
        }

        .text-group { flex: 1; display: flex; flex-direction: column; gap: 4px;}
        .fr-text { font-size: 1.1rem; font-weight: bold; color: var(--french-color); }
        .en-text { font-size: 0.95rem; color: var(--english-color); }

        .play-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 10px;
            flex: 0 0 auto;
        }
        .play-btn:hover { color: var(--primary); background: none;}

        .counter {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 50px;
            text-align: right;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🇫🇷 French Auto-Loop Tutor V2</h1>
    
    <textarea id="inputText" placeholder="Paste vocabulary here (French - English)..."></textarea>

    <div class="settings-grid">
        <div class="setting-item">
            <label>French Voice:</label>
            <select id="frVoiceSelect"></select>
        </div>
        <div class="setting-item">
            <label>English Voice:</label>
            <select id="enVoiceSelect"></select>
        </div>
        
        <div class="setting-item">
            <label>Speed (Default 0.8):</label>
            <div class="input-group">
                <input type="range" id="speedRate" min="0.5" max="1.5" step="0.1" value="0.8" oninput="speedNum.value = this.value">
                <input type="number" id="speedNum" min="0.5" max="1.5" step="0.1" value="0.8" oninput="speedRate.value = this.value">
            </div>
        </div>
        <div class="setting-item">
            <label>Pause Timing (Seconds):</label>
            <div class="input-group">
                <input type="range" id="pauseTime" min="0" max="4" step="0.5" value="1.5" oninput="pauseNum.value = this.value">
                <input type="number" id="pauseNum" min="0" max="4" step="0.5" value="1.5" oninput="pauseTime.value = this.value">
            </div>
        </div>
        
        <div class="setting-item">
            <label>French Repeats:</label>
            <div class="input-group">
                <input type="range" id="frRepeatRate" min="1" max="10" value="3" oninput="frRepeatNum.value = this.value">
                <input type="number" id="frRepeatNum" min="1" max="10" value="3" oninput="frRepeatRate.value = this.value">
            </div>
        </div>
        <div class="setting-item">
            <label>English Repeats:</label>
            <div class="input-group">
                <input type="range" id="enRepeatRate" min="0" max="10" value="1" oninput="enRepeatNum.value = this.value">
                <input type="number" id="enRepeatNum" min="0" max="10" value="1" oninput="enRepeatRate.value = this.value">
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button onclick="loadData()">1. Load List</button>
        <button class="primary" onclick="startAutoPlay()">2. ▶ Play All (Top to Bottom)</button>
        <button class="danger" onclick="stopAudio()">⏹ Stop</button>
    </div>

    <div class="list-container" id="listView">
        <!-- List items will be injected here -->
    </div>
</div>

<script>
    let parsedData =[];
    let synth = window.speechSynthesis;
    let frVoice = null;
    let enVoice = null;
    
    // Playback state
    let isPlaying = false;
    let isAutoPlayingAll = false;
    let currentLineIndex = 0;
    let timeoutIds =[]; 
    let cancelSleep = null;
    let currentSessionId = 0; // The Kill Switch ID
    
    // Fix for Chrome bug where long audio stops randomly
    window.utteranceWorkaround =[];

    // Load voices
    function populateVoiceList() {
        const voices = synth.getVoices();
        if (voices.length === 0) return;

        const frSelect = document.getElementById('frVoiceSelect');
        const enSelect = document.getElementById('enVoiceSelect');
        frSelect.innerHTML = '';
        enSelect.innerHTML = '';
        
        let frVoices = voices.filter(v => v.lang.startsWith('fr'));
        let enVoices = voices.filter(v => v.lang.startsWith('en'));

        frVoice = frVoices.find(v => v.lang === 'fr-FR' || v.lang === 'fr-CA') || frVoices[0] || voices[0];
        enVoice = enVoices.find(v => v.lang === 'en-US' || v.lang === 'en-GB') || enVoices[0] || voices[0];

        frVoices.forEach((voice, i) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.value = i;
            if(voice === frVoice) option.selected = true;
            frSelect.appendChild(option);
        });

        enVoices.forEach((voice, i) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.value = i;
            if(voice === enVoice) option.selected = true;
            enSelect.appendChild(option);
        });

        frSelect.onchange = (e) => { frVoice = frVoices[e.target.value]; };
        enSelect.onchange = (e) => { enVoice = enVoices[e.target.value]; };
    }

    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function loadData() {
        stopAudio();
        const text = document.getElementById('inputText').value;
        const lines = text.split('\n').filter(l => l.trim() !== '');
        
        parsedData = lines.map((line, index) => {
            const parts = line.split(/[-=|]/);
            return {
                id: index,
                fr: parts[0] ? parts[0].trim() : '',
                en: parts[1] ? parts[1].trim() : ''
            };
        });

        renderList();
    }

    function renderList() {
        const container = document.getElementById('listView');
        container.innerHTML = '';

        parsedData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.id = `item-${item.id}`;
            
            div.innerHTML = `
                <button class="play-btn" onclick="playSingleLine(${item.id})">▶</button>
                <div class="text-group">
                    <div class="fr-text">${item.fr}</div>
                    <div class="en-text">${item.en}</div>
                </div>
                <div class="counter" id="counter-${item.id}"></div>
            `;
            container.appendChild(div);
        });
    }

    // Helper to pause execution
    function sleep(ms) {
        return new Promise(resolve => {
            const id = setTimeout(resolve, ms);
            timeoutIds.push(id);
            cancelSleep = () => { clearTimeout(id); resolve(); };
        });
    }

    // Helper to speak text asynchronously
    function speakAsync(text, voice, rate) {
        return new Promise(resolve => {
            if (!text || text.trim() === '') { resolve(); return; }
            const u = new SpeechSynthesisUtterance(text);
            u.voice = voice;
            u.rate = rate;
            
            u.onend = () => resolve();
            u.onerror = () => resolve(); // Resolve even if canceled to avoid freezing
            
            // Keep utterance in memory to prevent Chrome bug
            window.utteranceWorkaround.push(u);
            if(window.utteranceWorkaround.length > 5) window.utteranceWorkaround.shift();

            synth.speak(u);
        });
    }

    function stopAudio() {
        currentSessionId++; // Kills any currently running loops
        isPlaying = false;
        isAutoPlayingAll = false;
        
        synth.cancel(); // Stop TTS audio instantly
        
        timeoutIds.forEach(clearTimeout); // Clear timers
        timeoutIds =[];
        if (cancelSleep) cancelSleep(); // Force wake up from sleep
        
        // Remove highlights
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('playing'));
        document.querySelectorAll('.counter').forEach(el => el.innerText = '');
    }

    function playSingleLine(index) {
        stopAudio();
        // Wait 50ms to ensure the browser successfully cleared the old audio
        setTimeout(() => {
            isAutoPlayingAll = false;
            currentLineIndex = index;
            startPlaybackLoop();
        }, 50);
    }

    function startAutoPlay() {
        if(parsedData.length === 0) return;
        stopAudio();
        setTimeout(() => {
            isAutoPlayingAll = true;
            currentLineIndex = 0;
            startPlaybackLoop();
        }, 50);
    }

    async function startPlaybackLoop() {
        const sessionId = currentSessionId; // Lock this loop to the current session
        isPlaying = true;

        while (isPlaying && currentLineIndex < parsedData.length) {
            if (sessionId !== currentSessionId) return; // Kill switch triggered

            const item = parsedData[currentLineIndex];
            
            // UI Updates
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('playing'));
            const currentRow = document.getElementById(`item-${item.id}`);
            const counterEl = document.getElementById(`counter-${item.id}`);
            
            if(currentRow) currentRow.classList.add('playing');

            // Read Settings
            const rate = parseFloat(document.getElementById('speedNum').value);
            const pauseMs = parseFloat(document.getElementById('pauseNum').value) * 1000;
            const frRepeats = parseInt(document.getElementById('frRepeatNum').value) || 1;
            const enRepeats = parseInt(document.getElementById('enRepeatNum').value) || 1;

            // --- Play English Sequence FIRST ---
            if (item.en && isPlaying) {
                for (let i = 1; i <= enRepeats; i++) {
                    if (sessionId !== currentSessionId) return; // Check kill switch again
                    if (counterEl) counterEl.innerText = `EN: ${i}/${enRepeats}`;
                    
                    await speakAsync(item.en, enVoice, 1.0); 
                    
                    if (sessionId !== currentSessionId) return; 
                    if (isPlaying && (i < enRepeats || (item.fr && frRepeats > 0))) {
                        await sleep(pauseMs);
                    }
                }
            }

            // --- Play French Sequence SECOND ---
            if (item.fr && isPlaying) {
                for (let i = 1; i <= frRepeats; i++) {
                    if (sessionId !== currentSessionId) return; // Check kill switch
                    if (counterEl) counterEl.innerText = `FR: ${i}/${frRepeats}`;
                    
                    await speakAsync(item.fr, frVoice, rate);
                    
                    if (sessionId !== currentSessionId) return;
                    if (isPlaying && i < frRepeats) {
                        await sleep(pauseMs);
                    }
                }
            }

            if (sessionId !== currentSessionId) return;
            if (counterEl) counterEl.innerText = `Done`;

            // If we are only playing one line, stop here
            if (!isAutoPlayingAll) {
                isPlaying = false;
                break;
            }

            // Move to next line
            await sleep(1500);
            currentLineIndex++;
        }

        // If auto-play finished naturally
        if (currentLineIndex >= parsedData.length && isAutoPlayingAll && sessionId === currentSessionId) {
            stopAudio();
        }
    }
</script>
</body>
</html>
